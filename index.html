<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>Tarjeta Digital</title>

    <link rel="stylesheet" href="index.css">

</head>

<body>

    <!-- MODAL REGISTRO -->

    <div id="overlay" class="overlay">

        <div class="modal-registro">

            <div class="modal-logo">
                👋
            </div>

            <h2>Bienvenido</h2>

            <input
                type="text"
                id="nombreVisitante"
                placeholder="Nombre completo"
                autocomplete="name">

            <input
                type="tel"
                id="telefonoVisitante"
                placeholder="Número de teléfono"
                autocomplete="tel">

            <button id="btnRegistrar">
                Continuar
            </button>

        </div>

    </div>

    <!-- CONTENIDO -->

    <main
        id="contenido"
        class="contenido bloqueado">

        <section class="header-card">

            <h1 id="nombreUsuario">
                Cargando...
            </h1>

            <h2 id="cargoUsuario">
                Cargo
            </h2>

        </section>

        <section class="video-card">

            <iframe
                id="videoUsuario"
                src=""
                allow="autoplay; encrypted-media"
                allowfullscreen
                loading="lazy">
            </iframe>

        </section>

        <section class="acciones">

            <a
                id="btnGuardarContacto"
                href="#"
                class="btn btn-contacto">

                📞 Contactar

            </a>

            <a
                id="btnWeb"
                href="#"
                target="_blank"
                class="btn btn-web">

                🌐 Visitar sitio web

            </a>

        </section>

    </main>

    <script
        type="module"
        src="index.js">
    </script>

</body>

</html>
